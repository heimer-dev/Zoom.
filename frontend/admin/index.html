<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom. Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-body">

  <!-- LOGIN SCREEN -->
  <div id="login-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#172554,#1e40af)">
    <div style="background:white;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 25px 50px rgba(0,0,0,.3)">
      <div style="text-align:center;margin-bottom:32px">
        <div style="font-family:'Playfair Display',serif;font-size:48px;font-weight:900;color:#1e40af">Zoom.</div>
        <div style="font-size:13px;color:#9ca3af;margin-top:4px">Redaktions-Login</div>
      </div>
      <div id="login-error" style="display:none;background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px"></div>
      <div class="form-group">
        <label class="form-label">Benutzername</label>
        <input type="text" id="login-username" class="form-input" placeholder="Benutzername" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Passwort</label>
        <input type="password" id="login-password" class="form-input" placeholder="Passwort" autocomplete="current-password">
      </div>
      <button onclick="doLogin()" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">Anmelden</button>
    </div>
  </div>

  <!-- CHANGE PASSWORD SCREEN -->
  <div id="change-pw-screen" style="display:none;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#172554,#1e40af)">
    <div style="background:white;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 25px 50px rgba(0,0,0,.3)">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:48px;margin-bottom:8px">🔐</div>
        <div style="font-size:20px;font-weight:700;color:#1e3a8a">Passwort ändern</div>
        <div style="font-size:13px;color:#9ca3af;margin-top:4px">Bitte ändere dein Passwort beim ersten Login</div>
      </div>
      <div id="pw-error" style="display:none;background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px"></div>
      <div class="form-group">
        <label class="form-label">Neues Passwort</label>
        <input type="password" id="new-password" class="form-input" placeholder="Mindestens 6 Zeichen">
      </div>
      <div class="form-group">
        <label class="form-label">Passwort bestätigen</label>
        <input type="password" id="confirm-password" class="form-input" placeholder="Passwort wiederholen">
      </div>
      <button onclick="doChangePassword()" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">Passwort speichern</button>
    </div>
  </div>

  <!-- ADMIN APP -->
  <div id="admin-app" style="display:none">
    <!-- Topbar -->
    <div class="admin-topbar">
      <div class="topbar-logo">Zoom<span>.</span></div>
      <div class="topbar-sep"></div>
      <div class="topbar-subtitle">Admin-Bereich</div>
      <div class="topbar-spacer"></div>
      <div class="topbar-user">
        <div class="topbar-user-name" id="topbar-username"></div>
        <div class="topbar-user-badge" id="topbar-role-badge"></div>
      </div>
      <button onclick="logout()" class="topbar-logout">Abmelden</button>
    </div>

    <!-- Layout -->
    <div class="admin-layout">
      <!-- Sidebar -->
      <nav class="admin-sidebar" id="sidebar">
        <div class="sidebar-section-label">Zeitung</div>
        <a class="sidebar-link active" onclick="navigate('dashboard')" id="nav-dashboard">
          <span class="sidebar-icon">📊</span> Dashboard
        </a>
        <a class="sidebar-link" onclick="navigate('editions')" id="nav-editions">
          <span class="sidebar-icon">📰</span> Ausgaben
        </a>
        <div class="sidebar-section-label admin-only" style="display:none">Administration</div>
        <a class="sidebar-link admin-only" onclick="navigate('users')" id="nav-users" style="display:none">
          <span class="sidebar-icon">👥</span> Benutzer
        </a>
        <a class="sidebar-link admin-only" onclick="navigate('settings')" id="nav-settings" style="display:none">
          <span class="sidebar-icon">⚙️</span> Einstellungen
        </a>
        <div style="flex:1"></div>
        <div style="padding:16px">
          <a href="/" target="_blank" class="sidebar-link" style="border:1px solid rgba(255,255,255,.1);border-radius:8px;margin:0">
            <span class="sidebar-icon">🔗</span> Zur Zeitung
          </a>
        </div>
      </nav>

      <!-- Main -->
      <main class="admin-main" id="admin-main">
        <!-- Content injected by JS -->
      </main>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>

  <script src="/js/admin-utils.js"></script>
  <script src="/js/admin-auth.js"></script>
  <script src="/js/admin-dashboard.js"></script>
  <script src="/js/admin-editions.js"></script>
  <script src="/js/admin-users.js"></script>
  <script src="/js/admin-settings.js"></script>
  <script src="/js/admin-main.js"></script>
</body>
</html>
