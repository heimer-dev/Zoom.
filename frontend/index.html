<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom. – Die Schülerzeitung des Burgaugymnasiums</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">Zoom<span>.</span></div>
      <nav class="header-nav">
        <a href="/" class="nav-link active">Startseite</a>
        <a href="/reader.html" class="nav-link">Ausgaben</a>
        <a href="/admin/" class="nav-link btn-admin">Admin</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <h1 class="hero-title">Zoom.</h1>
      <p class="hero-subtitle" id="hero-tagline">Die Schülerzeitung des Burgaugymnasiums</p>
      <p class="hero-tagline">Burgaugymnasium · Immer aktuell · Immer dabei</p>
    </div>
  </section>

  <!-- MAIN -->
  <main class="main-content">
    <div class="section-header">
      <h2 class="section-title">Aktuelle Ausgaben</h2>
      <a href="/reader.html" class="section-link">Alle Ausgaben →</a>
    </div>
    <div id="editions-grid" class="editions-grid">
      <div class="loading"><div class="spinner"></div> Lade Ausgaben…</div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-logo">Zoom.</div>
    <div class="footer-tagline">Die Schülerzeitung des Burgaugymnasiums</div>
    <div class="footer-links">
      <a href="/reader.html">Alle Ausgaben</a>
      <a href="/admin/">Redaktion</a>
      <a href="#impressum">Impressum</a>
    </div>
    <div class="footer-copy">© <span id="year"></span> Zoom. · Burgaugymnasium</div>
  </footer>

  <div class="toast-container" id="toasts"></div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const API = '/api';

    async function loadEditions() {
      const grid = document.getElementById('editions-grid');
      try {
        const res = await fetch(`${API}/editions`);
        const editions = await res.json();
        const published = editions.filter(e => e.status === 'published');

        if (published.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div class="empty-icon">📰</div>
              <div class="empty-title">Noch keine Ausgaben</div>
              <div class="empty-text">Die erste Ausgabe erscheint bald!</div>
            </div>`;
          return;
        }

        grid.innerHTML = published.map(e => editionCard(e)).join('');
      } catch(err) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><div class="empty-title">Fehler beim Laden</div></div>`;
      }
    }

    function editionCard(e) {
      const date = e.published_at ? new Date(e.published_at).toLocaleDateString('de-DE', { year:'numeric', month:'long', day:'numeric' }) : '';
      return `
        <a href="/reader.html?id=${e.id}" class="edition-card">
          <div class="edition-cover" style="background: linear-gradient(135deg, ${e.cover_color || '#1e40af'}, ${lighten(e.cover_color || '#1e40af')})">
            <div class="edition-cover-title">Zoom.</div>
            <div class="edition-cover-wave"></div>
          </div>
          <div class="edition-body">
            ${e.edition_number ? `<div class="edition-number">Ausgabe ${e.edition_number}</div>` : ''}
            <div class="edition-title">${e.title}</div>
            ${e.subtitle ? `<div class="edition-subtitle">${e.subtitle}</div>` : ''}
            <div class="edition-meta">
              <span class="edition-date">${date}</span>
              <span class="edition-badge badge-published">${e.article_count || 0} Artikel</span>
            </div>
          </div>
        </a>`;
    }

    function lighten(hex) {
      // Simple color lightening for gradient
      try {
        let r = parseInt(hex.slice(1,3),16);
        let g = parseInt(hex.slice(3,5),16);
        let b = parseInt(hex.slice(5,7),16);
        r = Math.min(255, r + 60); g = Math.min(255, g + 60); b = Math.min(255, b + 80);
        return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
      } catch { return '#3b82f6'; }
    }

    // Load settings
    async function loadSettings() {
      try {
        const res = await fetch(`${API}/settings`);
        const s = await res.json();
        if (s.newspaper_tagline) document.getElementById('hero-tagline').textContent = s.newspaper_tagline;
        if (s.newspaper_name) document.title = `${s.newspaper_name} – Die Schülerzeitung des Burgaugymnasiums`;
      } catch {}
    }

    loadSettings();
    loadEditions();
  </script>
</body>
</html>
